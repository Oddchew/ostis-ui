<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Format converter</title>
    <style>
      body {
        margin: 0;
        min-height: auto;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <p 
      style="
        width: 100%;
        height: auto;
        color: #90563d;
        font-size: 16px;
        font-family: 'Arial';
        text-align: center;
        background-color: #fbd9b7;
        padding: 20px;
        margin: 20px;
        line-height: 1.5;
        font-weight: 600;
        text-shadow: 1px 1px 2px #dd622d;
        border: 4px solid #d8a269;
        border-radius: 10px;
      "
    >
    My text.
    </p>

    <textarea
      id="inputData"
      placeholder="Input data..."
      style="
        width: 100%;
        height: auto;
        padding: 20px;
        margin: 20px;
        font-family: monospace;
        font-size: 14px;
        border: 4px solid #cccccc;
        border-radius: 10px;
        background: #ffffff;
        resize: vertical;
      "
    >
    </textarea>
  </body>
</html>
